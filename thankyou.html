<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent</title>

    <meta http-equiv="refresh" content="5;url=https://sakshi1727techie-bot.github.io/Sakshi-portfolio/">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#070b18;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .box{
            background:#111827;
            padding:50px;
            border-radius:20px;
            width:90%;
            max-width:500px;
            border:1px solid #1e3a5f;
            box-shadow:0 0 30px rgba(0,174,255,.15);
        }

        .icon{
            font-size:60px;
            color:#2ecc71;
            margin-bottom:20px;
        }

        h1{
            font-size:34px;
            margin-bottom:15px;
        }

        p{
            color:#c9d1d9;
            line-height:1.7;
            margin-bottom:15px;
        }

        a{
            display:inline-block;
            margin-top:15px;
            padding:14px 30px;
            background:#29b6f6;
            color:#fff;
            text-decoration:none;
            border-radius:40px;
            font-weight:600;
            transition:.3s;
        }

        a:hover{
            background:#0ea5e9;
            transform:translateY(-3px);
        }
    </style>

</head>

<body>

<div class="box">

<div class="icon">✅</div>

<h1>Message Sent!</h1>

<p>Thank you for reaching out.</p>

<p>Your message has been sent successfully.</p>

<p>I'll reply to your message soon.</p>

<a href="https://sakshi1727techie-bot.github.io/Sakshi-portfolio/">
Back to Portfolio
</a>

</div>

</body>
</html>
